<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fundraiser Feed</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df29e",
                        "background-light": "#f5f8f7",
                        "background-dark": "#050505",
                        "surface": "rgba(255, 255, 255, 0.08)",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Grotesk:wght@300..700&display=swap');

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #050505;
            color: #F8F8F8;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Prevent scrolling, handle internally */
        }

        h1, h2, h3, h4, h5, h6, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .text-shadow {
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-slate-100 h-screen w-screen flex justify-center items-center">
<!-- Mobile Device Container (simulated for desktop viewing, full screen on mobile) -->
<main class="relative w-full h-full max-w-md mx-auto overflow-hidden bg-black shadow-2xl sm:rounded-[40px] sm:h-[850px] sm:border-[8px] sm:border-gray-900">
<!-- Video Background Layer -->
<div class="absolute inset-0 z-0 bg-cover bg-center" data-alt="Volunteer serving food at a community kitchen" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCCTIFNmQ1aWZDXsTY27AiWjbDJfOxXuTqsy_zcGXsXwFtW1BhS8An6dZwBpEECzq03sbWS7uwwKP8lZQUD52Nj_4zunH6jdXypkh6ktuGYTz0H-Nz8WQEp51veFfmOZzO5rwUj9aPBPZHwxHAfnLqX3wbU0l5pDjzhG2lR3t5EI0GZzkzuCJXaCD496ZJ2BeVdZkHVGVwtoZx6vORwrZh3_UBXtYpHHNNQ0zq9Bm2FUHwmgpMQIp0eFUgvtSDjgXaeTCHZ5QKCSi0');">
<!-- Top Gradient Mask for Status Bar -->
<div class="absolute top-0 left-0 right-0 h-32 bg-gradient-to-b from-black/60 to-transparent pointer-events-none"></div>
<!-- Bottom Gradient Mask for Text/UI -->
<div class="absolute bottom-0 left-0 right-0 h-1/2 bg-gradient-to-t from-black/80 via-black/40 to-transparent pointer-events-none"></div>
</div>
<!-- System Status Bar (Simulated) -->
<div class="absolute top-0 w-full px-6 py-4 flex justify-between items-center z-50 text-white/90 text-sm font-medium pointer-events-none">
<span>9:41</span>
<div class="flex gap-2 items-center">
<span class="material-symbols-outlined text-[16px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[16px]">wifi</span>
<span class="material-symbols-outlined text-[16px]">battery_full</span>
</div>
</div>
<!-- Main UI Layer -->
<div class="absolute inset-0 z-10 flex flex-col justify-end pb-[76px] px-4 pointer-events-none">
<div class="flex justify-between items-end w-full mb-6">
<!-- Narrative Block (Bottom Left) -->
<div class="flex-1 pr-12 pointer-events-auto cursor-pointer group">
<div class="flex items-center gap-2 mb-2">
<div class="w-8 h-8 rounded-full bg-gray-300 overflow-hidden border border-white/20">
<img alt="Sarah J." class="w-full h-full object-cover" data-alt="Portrait of Sarah J." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8-6CZOk0PIiLSBdb37KeetLkMq3YLgPNaE8rzrokXFdn6X4pHtp3aNS6znZOPBfBrvuQIcbOm5ujFY_ic47vnlcGgHc5kkw4Uy4swPSuRTd1cU8NVJPp6-_4vDjEJXfXni2g7CA4pB3pIhsSg-URCPK8hbd_SsZ-miEBemcuKo1Y6mfQGs5FolzWr_oSH8Ih46uSq-8nXg5qQ72v7ZaEaXlMPHwId7Joyd-gjDXKHvkfw2jGOff2hAYsv9mZhIA9g3P_81hhee6A"/>
</div>
<span class="font-display font-medium text-white text-shadow">@sarah_cares</span>
<span class="bg-primary/20 text-primary text-xs px-2 py-0.5 rounded-full font-medium border border-primary/30">Verified</span>
</div>
<h1 class="font-display text-2xl font-bold text-white leading-tight mb-1 text-shadow transition-transform group-active:scale-[0.98]">
                        Help Rebuild Our Community Center
                    </h1>
<p class="text-white/90 text-sm line-clamp-2 leading-snug text-shadow">
                        The recent storm severely damaged the roof of our local center. We need your help to make it safe for the kids before winter starts. Every dollar counts.
                    </p>
<span class="text-white/60 text-xs mt-1 font-medium">Tap to read more</span>
</div>
<!-- Action Column (Right Aligned) -->
<div class="flex flex-col items-center gap-5 pb-4 pointer-events-auto">
<!-- Profile Add -->
<button class="relative group">
<div class="w-12 h-12 rounded-full border-2 border-white overflow-hidden shadow-lg">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Portrait of Sarah J." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCkBW5Ok2a1ahHzibjezHzRxKdQLDl0aWdM7omHKDjak-3lDIX7A8LMd59JA6grnuCrVpsr2TjJ3LS-H1jCXIRvVLN9qpuN9R6kQj02vYy6jPS_ssPc25hKgndqBbiywBQ6iDAQGqudHXTAMFpkwa7y3vdr41DXjwSA878Wdds7EUFQ58M3TGlLKKidHwyjYyjH30IOBRpT38kmzdDgEDj8mXXYVm1E0Yy6EaKpSUnd8AsU6Jr4xoSNqewYb2wPJJkuWu0bDLdEROQ"/>
</div>
<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-6 h-6 bg-primary rounded-full flex items-center justify-center border-2 border-black">
<span class="material-symbols-outlined text-[16px] text-black font-bold">add</span>
</div>
</button>
<!-- Like -->
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full glass flex items-center justify-center text-white transition-transform group-active:scale-90">
<span class="material-symbols-outlined text-[28px]">favorite</span>
</div>
<span class="text-white text-xs font-medium text-shadow">12.4K</span>
</button>
<!-- Comments -->
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full glass flex items-center justify-center text-white transition-transform group-active:scale-90">
<span class="material-symbols-outlined text-[28px]">chat_bubble</span>
</div>
<span class="text-white text-xs font-medium text-shadow">342</span>
</button>
<!-- Share -->
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full glass flex items-center justify-center text-white transition-transform group-active:scale-90">
<span class="material-symbols-outlined text-[28px]">share</span>
</div>
<span class="text-white text-xs font-medium text-shadow">Share</span>
</button>
<!-- More -->
<button class="flex flex-col items-center gap-1 group">
<div class="w-12 h-12 rounded-full glass flex items-center justify-center text-white transition-transform group-active:scale-90">
<span class="material-symbols-outlined text-[28px]">more_horiz</span>
</div>
</button>
</div>
</div>
</div>
<!-- Quick Donate Sticky Bottom Area -->
<div class="absolute bottom-0 left-0 w-full z-20 pointer-events-none flex flex-col items-center">
<div class="w-full px-4 pb-6 pt-4 bg-gradient-to-t from-black via-black/80 to-transparent flex justify-center pointer-events-auto">
<!-- Quick Donate Pill -->
<button class="w-full h-[56px] glass rounded-full flex items-center justify-center gap-2 border border-primary/50 shadow-[0_0_15px_rgba(13,242,158,0.2)] active:scale-[0.98] transition-all relative overflow-hidden group">
<div class="absolute inset-0 bg-primary/10 group-active:bg-primary/20 transition-colors"></div>
<span class="material-symbols-outlined text-primary text-[24px]">favorite</span>
<span class="font-display font-bold text-white text-[18px] uppercase tracking-wide">Give $5</span>
</button>
</div>
<!-- Progress Bar at the very bottom edge -->
<div class="w-full h-1 bg-white/20 relative">
<div class="absolute top-0 left-0 h-full bg-primary w-1/3 shadow-[0_0_8px_#0df29e]"></div>
</div>
</div>
</main>
</body></html>
