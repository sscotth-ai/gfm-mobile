<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Donation Drawer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#0df29e",
          "background-light": "#f5f8f7",
          "background-dark": "#10221b",
        },
        fontFamily: {
          "display": ["Space Grotesk", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
      },
    },
  }
</script>
<style>
  body {
    font-family: "Space Grotesk", sans-serif;
  }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 h-screen w-screen overflow-hidden flex flex-col justify-end relative">
<!-- Simulated Background Media -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-slate-800 bg-cover bg-center" data-alt="A child looking directly at the camera in a developing country" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAqEGSKvA-AVtnp1Yq8GTnURmMKhVEirVkEvvjhxHvK7evJqK9tGoNmzsQrpx8qyTiLpk9_BH9gCzpF_SsUlyyq6eAEkkUb7m51e6BC5r-1CiIi4lBpqNLWyVxsg6aBNAwoAsvkxGpqOIfZSS7B2xA4C8FKlrdeXogLpLhLlp9GZNTF81qdazW9Xx1roc-TTuqSw1orz07lssvhOBsMWh3qte2GJFzPAOw6rwlYj1WWqVj5ZBh4SFQM5umWpjD_zHAbuz_cXs8GrkI');"></div>
<!-- Top Gradient for Status Bar -->
<div class="absolute top-0 inset-x-0 h-32 bg-gradient-to-b from-black/60 to-transparent"></div>
</div>
<!-- Backdrop Overlay -->
<div class="absolute inset-0 z-10 bg-black/40 backdrop-blur-md"></div>
<!-- Donation Drawer -->
<div class="relative z-20 w-full h-[65%] max-h-[600px] flex flex-col bg-background-dark/80 backdrop-blur-[24px] rounded-t-3xl border-t border-white/10 shadow-2xl transition-transform duration-300 ease-out transform translate-y-0">
<!-- Drag Handle -->
<div class="w-full flex justify-center pt-4 pb-2 cursor-pointer">
<div class="w-12 h-1.5 bg-white/20 rounded-full"></div>
</div>
<div class="flex-1 overflow-y-auto px-6 pb-24 flex flex-col">
<!-- Header -->
<div class="text-center mb-8">
<h2 class="text-2xl font-bold tracking-tight text-white mb-2 font-display">Make an impact</h2>
<p class="text-slate-400 text-sm font-display">Select an amount to give directly to Sarah's cause.</p>
</div>
<!-- Amount Grid -->
<div class="grid grid-cols-2 gap-4 mb-8">
<!-- $10 Option -->
<button class="relative h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-white/10 active:scale-95">
<span class="text-xl font-bold text-white font-display">$10</span>
</button>
<!-- $25 Option -->
<button class="relative h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-white/10 active:scale-95">
<span class="text-xl font-bold text-white font-display">$25</span>
</button>
<!-- $50 Option (Selected State) -->
<button class="relative h-16 rounded-2xl bg-primary/10 border-2 border-primary flex items-center justify-center transition-all active:scale-95 shadow-[0_0_20px_rgba(13,242,158,0.2)]">
<span class="text-xl font-bold text-primary font-display">$50</span>
</button>
<!-- $100 Option -->
<button class="relative h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-white/10 active:scale-95">
<span class="text-xl font-bold text-white font-display">$100</span>
</button>
<!-- $250 Option -->
<button class="relative h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-white/10 active:scale-95">
<span class="text-xl font-bold text-white font-display">$250</span>
</button>
<!-- Custom Option -->
<button class="relative h-16 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center transition-all hover:bg-white/10 active:scale-95">
<span class="text-lg font-medium text-slate-300 font-display">Custom</span>
</button>
</div>
<!-- Impact Label -->
<div class="mt-auto mb-6 text-center px-4">
<div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/5 border border-white/10">
<span class="material-symbols-outlined text-primary text-sm">volunteer_activism</span>
<p class="text-sm text-slate-200 font-medium font-display">Your <span class="text-primary font-bold">$50</span> provides 3 days of shelter.</p>
</div>
</div>
</div>
<!-- Sticky Footer CTA -->
<div class="absolute bottom-0 inset-x-0 p-6 bg-gradient-to-t from-background-dark via-background-dark/80 to-transparent pt-12">
<button class="w-full h-14 bg-white text-black rounded-full font-bold text-lg tracking-wide flex items-center justify-center gap-2 transition-transform active:scale-[0.98] font-display shadow-lg">
<svg class="w-5 h-5 fill-current" viewbox="0 0 384 512" xmlns="http://www.w3.org/2000/svg"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"></path></svg>
      Pay
    </button>
</div>
</div>
</body></html>
